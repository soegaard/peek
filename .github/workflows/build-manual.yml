name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "peek-lib/**"
      - "peek-doc/**"
      - "assets/**"
      - "tools/**"
      - "info.rkt"
      - "*.md"
      - ".github/workflows/build-manual.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-manual:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout peek
        uses: actions/checkout@v4

      - name: Checkout lexers
        uses: actions/checkout@v4
        with:
          repository: soegaard/lexers
          path: lexers

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          architecture: x64
          distribution: full
          version: stable

      - name: Link local packages
        run: |
          raco pkg install --auto --link "$GITHUB_WORKSPACE/lexers/lexers-lib"
          raco pkg install --auto --link "$GITHUB_WORKSPACE/peek-lib"
          raco pkg install --auto --link "$GITHUB_WORKSPACE/peek-doc"

      - name: Render peek manual
        run: |
          raco scribble +m --html --dest html/ --redirect-main https://soegaard.github.io/peek/ peek-doc/peek.scrbl
          cp html/peek.html html/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: html/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-manual
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
